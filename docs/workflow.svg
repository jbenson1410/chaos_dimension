<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 740" width="1480" height="740" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Chaos Dimension — the loop: Notion (source of truth) to Chaos Dimension (task queue) to Chaos Conductor (control plane) to Claude Code (execution), with agents updating the board and a continuous review cycle.">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B5B5AF"/>
    </marker>
    <symbol id="iDoc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="3" width="14" height="18" rx="2.5"/><line x1="8.5" y1="8" x2="15.5" y2="8"/><line x1="8.5" y1="12" x2="15.5" y2="12"/><line x1="8.5" y1="16" x2="13" y2="16"/>
    </symbol>
    <symbol id="iKanban" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="5" width="16" height="14" rx="2.5"/><line x1="9.3" y1="5" x2="9.3" y2="19"/><line x1="14.6" y1="5" x2="14.6" y2="19"/>
    </symbol>
    <symbol id="iNode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="12" x2="5.5" y2="6.5"/><line x1="12" y1="12" x2="18.5" y2="7"/><line x1="12" y1="12" x2="12" y2="19.5"/>
      <circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/><circle cx="5.5" cy="6.5" r="2"/><circle cx="18.5" cy="7" r="2"/><circle cx="12" cy="19.5" r="2"/>
    </symbol>
    <symbol id="iTerm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6,8 11,12 6,16"/><line x1="12.5" y1="16.5" x2="18" y2="16.5"/>
    </symbol>
    <symbol id="iLoop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 11 A7 7 0 0 1 17.5 7.5"/><polyline points="17.8 3.6 17.8 7.8 13.6 7.8"/>
      <path d="M19 13 A7 7 0 0 1 6.5 16.5"/><polyline points="6.2 20.4 6.2 16.2 10.4 16.2"/>
    </symbol>
  </defs>

  <rect x="4" y="4" width="1472" height="732" rx="18" fill="#F7F7F5" stroke="#ECECE8" stroke-width="1.5"/>

  <!-- header -->
  <rect x="44" y="40" width="44" height="44" rx="11" fill="none" stroke="#1C1C1A" stroke-width="2.5"/>
  <use href="#iLoop" x="52" y="48" width="28" height="28" color="#1C1C1A"/>
  <text x="104" y="74" font-size="34" font-weight="700" fill="#1C1C1A">Chaos Dimension &#8211; the loop</text>
  <text x="106" y="106" font-size="16" fill="#8A8A85">A continuous cycle of review, coordination, and execution.</text>

  <!-- top: review & refine arc (board -> Notion) -->
  <path d="M 558 200 C 558 152, 194 152, 194 200" fill="none" stroke="#B5B5AF" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#ah)"/>
  <text x="376" y="142" text-anchor="middle" font-size="15" fill="#8A8A85">you review &amp; refine &#8635;</text>

  <!-- ============ cards ============ -->
  <!-- card 1: Notion -->
  <g transform="translate(44,200)">
    <rect width="300" height="300" rx="16" fill="#FFFFFF" stroke="#E6E6E3" stroke-width="1.5"/>
    <text x="28" y="48" font-size="20" font-weight="600" fill="#A6A6A0">1</text>
    <circle cx="54" cy="96" r="27" fill="#F0F0EC"/>
    <use href="#iDoc" x="40" y="82" width="28" height="28" color="#44443F"/>
    <text x="28" y="162" font-size="23" font-weight="700" fill="#1C1C1A">Notion</text>
    <text x="28" y="194" font-size="16" fill="#43433F">Heavy thinking &#8212;</text>
    <text x="28" y="218" font-size="16" fill="#43433F">requirements &amp; specs</text>
    <g transform="translate(28,242)">
      <rect width="152" height="24" rx="12" fill="#F4F4F1"/>
      <circle cx="14" cy="12" r="3.5" fill="#A6A6A0"/>
      <text x="26" y="16" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#5A5A55">SOURCE OF TRUTH</text>
    </g>
  </g>

  <!-- card 2: Chaos Dimension -->
  <g transform="translate(408,200)">
    <rect width="300" height="300" rx="16" fill="#FFFFFF" stroke="#E6E6E3" stroke-width="1.5"/>
    <text x="28" y="48" font-size="20" font-weight="600" fill="#A6A6A0">2</text>
    <circle cx="54" cy="96" r="27" fill="#F0F0EC"/>
    <use href="#iKanban" x="40" y="82" width="28" height="28" color="#44443F"/>
    <text x="28" y="162" font-size="23" font-weight="700" fill="#1C1C1A">Chaos Dimension</text>
    <text x="28" y="194" font-size="16" fill="#43433F">Claude turns reqs</text>
    <text x="28" y="218" font-size="16" fill="#43433F">into tasks on the board</text>
    <g transform="translate(28,242)">
      <rect width="118" height="24" rx="12" fill="#F4F4F1"/>
      <circle cx="14" cy="12" r="3.5" fill="#DB2777"/>
      <text x="26" y="16" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#5A5A55">TASK QUEUE</text>
    </g>
    <text x="28" y="292" font-size="12.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#9A9A95">backlog &#8594; active &#8594; review &#8594; done</text>
  </g>

  <!-- card 3: Chaos Conductor -->
  <g transform="translate(772,200)">
    <rect width="300" height="300" rx="16" fill="#FFFFFF" stroke="#E6E6E3" stroke-width="1.5"/>
    <text x="28" y="48" font-size="20" font-weight="600" fill="#A6A6A0">3</text>
    <circle cx="54" cy="96" r="27" fill="#F0F0EC"/>
    <use href="#iNode" x="40" y="82" width="28" height="28" color="#44443F"/>
    <text x="28" y="162" font-size="23" font-weight="700" fill="#1C1C1A">Chaos Conductor</text>
    <text x="28" y="194" font-size="16" fill="#43433F">Distributes tasks</text>
    <text x="28" y="218" font-size="16" fill="#43433F">across the fleet</text>
    <g transform="translate(28,242)">
      <rect width="140" height="24" rx="12" fill="#F4F4F1"/>
      <circle cx="14" cy="12" r="3.5" fill="#2563EB"/>
      <text x="26" y="16" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#5A5A55">CONTROL PLANE</text>
    </g>
  </g>

  <!-- card 4: Claude Code -->
  <g transform="translate(1136,200)">
    <rect width="300" height="300" rx="16" fill="#FFFFFF" stroke="#E6E6E3" stroke-width="1.5"/>
    <text x="28" y="48" font-size="20" font-weight="600" fill="#A6A6A0">4</text>
    <circle cx="54" cy="96" r="27" fill="#F0F0EC"/>
    <use href="#iTerm" x="40" y="82" width="28" height="28" color="#44443F"/>
    <text x="28" y="162" font-size="23" font-weight="700" fill="#1C1C1A">Claude Code</text>
    <text x="28" y="194" font-size="16" fill="#43433F">Agents execute on</text>
    <text x="28" y="218" font-size="16" fill="#43433F">a remote box</text>
    <g transform="translate(28,242)">
      <rect width="106" height="24" rx="12" fill="#F4F4F1"/>
      <circle cx="14" cy="12" r="3.5" fill="#16A34A"/>
      <text x="26" y="16" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#5A5A55">EXECUTION</text>
    </g>
    <text x="28" y="292" font-size="12.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#9A9A95">via claude-rc-server</text>
  </g>

  <!-- forward arrows -->
  <line x1="352" y1="330" x2="400" y2="330" stroke="#B5B5AF" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="716" y1="330" x2="764" y2="330" stroke="#B5B5AF" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="1080" y1="330" x2="1128" y2="330" stroke="#B5B5AF" stroke-width="2" marker-end="url(#ah)"/>

  <!-- bottom feedback arc: agents -> board -->
  <path d="M 1286 500 C 1286 600, 558 600, 558 500" fill="none" stroke="#B5B5AF" stroke-width="1.8" marker-end="url(#ah)"/>
  <g transform="translate(922,575)">
    <rect x="-236" y="-16" width="472" height="32" rx="16" fill="#F2F2EF" stroke="#E6E6E3" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="14.5" fill="#3F3F3C">agents update the board &#8212; claim &#183; report progress &#183; move to done</text>
  </g>
  <text x="922" y="604" text-anchor="middle" font-size="13" fill="#8A8A85">&#8635; the loop continues</text>

  <!-- legend -->
  <rect x="360" y="648" width="760" height="58" rx="12" fill="#F4F4F1" stroke="#E6E6E3" stroke-width="1"/>
  <g transform="translate(487,677)">
    <circle cx="-86" cy="0" r="4" fill="#DB2777"/>
    <use href="#iKanban" x="-74" y="-9" width="18" height="18" color="#6B6B66"/>
    <text x="-50" y="-3" font-size="13" font-weight="600" fill="#43433F">Chaos Dimension</text>
    <text x="-50" y="15" font-size="12" fill="#8A8A85">coordinates</text>
  </g>
  <g transform="translate(740,677)">
    <circle cx="-86" cy="0" r="4" fill="#2563EB"/>
    <use href="#iNode" x="-74" y="-9" width="18" height="18" color="#6B6B66"/>
    <text x="-50" y="-3" font-size="13" font-weight="600" fill="#43433F">Chaos Conductor</text>
    <text x="-50" y="15" font-size="12" fill="#8A8A85">controls</text>
  </g>
  <g transform="translate(993,677)">
    <circle cx="-92" cy="0" r="4" fill="#16A34A"/>
    <use href="#iTerm" x="-80" y="-9" width="18" height="18" color="#6B6B66"/>
    <text x="-56" y="-3" font-size="13" font-weight="600" fill="#43433F">claude-rc-server</text>
    <text x="-56" y="15" font-size="12" fill="#8A8A85">executes</text>
  </g>
</svg>
